name: 03 Deploy
on:
  pull_request:
    paths: ['data/articles/**']

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.event.pull_request.head.ref }} }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install python-frontmatter jinja2 jsonschema

      - name: Validate Article JSON
        run: |
          for f in data/articles/*.json; do
            python scripts/validate_json.py --json "$f" --schema data/schema/product.schema.json
          done

      - name: JSON → Hugo Markdown
        run: |
          python scripts/build_post.py --src data/articles/ --dst content/posts/

      - name: Commit rendered Markdown
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          git commit -m "docs(blog): render article from json" || echo "No changes"
          git push origin ${{ github.event.pull_request.head.ref }}

  deploy:
    needs: render
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build Hugo
        run: |
          cd hugo && hugo --minify --destination ../public

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
