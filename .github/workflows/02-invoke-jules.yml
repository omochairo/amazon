name: Invoke Jules for New Queue
on:
  push:
    paths: ['data/raw/**']

jobs:
  invoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Call Jules API
        run: |
          curl -X POST https://jules.googleapis.com/v1/tasks \
            -H "Authorization: Bearer ${{ secrets.JULES_API_KEY }}" \
            -d @- <<EOF
          {
            "repo": "omochairo/amazon",
            "branch": "main",
            "prompt_file": "jules/PROMPT_TEMPLATE.md",
            "context_files": [
              "AGENTS.md",
              "data/raw/",
              "jules/EXAMPLES/"
            ]
          }
          EOF
