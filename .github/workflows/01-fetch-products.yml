name: Fetch Amazon Products
on:
  workflow_dispatch:
    inputs:
      asins:
        description: 'カンマ区切りASIN'
        required: false
      keyword:
        description: '検索キーワード'
        required: false
  schedule:
    - cron: '*/10 * * * *'  # 10分おきにトレンド取得

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Fetch Amazon Data
        run: |
          python scripts/fetch_amazon.py \
            --asin "${{ github.event.inputs.asins }}" \
            --keyword "${{ github.event.inputs.keyword }}" \
            --out data/raw/
        env:
          PAAPI_ACCESS_KEY: ${{ secrets.PAAPI_ACCESS_KEY }}
          PAAPI_SECRET_KEY: ${{ secrets.PAAPI_SECRET_KEY }}
          PAAPI_PARTNER_TAG: ${{ secrets.PAAPI_PARTNER_TAG }}
      - name: Fetch Trends
        run: python scripts/fetch_trends.py --out data/raw/
      - name: Fetch Rakuten Data
        run: python scripts/fetch_rakuten.py --out data/raw/
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      - name: Fetch YouTube Data
        run: python scripts/fetch_youtube.py --out data/raw/
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - name: Fetch Yahoo News
        run: python scripts/fetch_yahoo_news.py --out data/raw/
      - uses: peter-evans/create-pull-request@v6
        with:
          branch: data/auto-fetch
          title: "data: 商品データ更新"
