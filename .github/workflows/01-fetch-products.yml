name: Fetch Amazon Products
on:
  workflow_dispatch:
    inputs:
      asins:
        description: 'カンマ区切りASIN'
        required: false
      keyword:
        description: '検索キーワード'
        required: false
  schedule:
    - cron: '*/10 * * * *'  # 10分おきにトレンド取得

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Fetch Amazon Data
        run: |
          python scripts/fetch_amazon.py \
            --asin "${{ github.event.inputs.asins }}" \
            --keyword "${{ github.event.inputs.keyword }}" \
            --out data/raw/
        env:
          AMAZON_CREATORS_APPLICATION_ID: ${{ secrets.AMAZON_CREATORS_APPLICATION_ID }}
          AMAZON_CREATORS_CREDENTIAL_ID: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_ID }}
          AMAZON_CREATORS_CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_SECRET }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}

      - name: Fetch Trends
        if: ${{ always() }}
        run: python scripts/fetch_trends.py --out data/raw/

      - name: Fetch Rakuten Data
        if: ${{ always() }}
        run: python scripts/fetch_rakuten.py --out data/raw/
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}

      - name: Fetch YouTube Data
        if: ${{ always() }}
        run: python scripts/fetch_youtube.py --out data/raw/
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Fetch Yahoo News
        if: ${{ always() }}
        run: python scripts/fetch_yahoo_news.py --out data/raw/

      - name: Fetch Takara Tomy Latest
        if: ${{ always() }}
        run: python scripts/fetch_takaratomy.py

      - name: Fetch Yahoo Shopping Data
        if: ${{ always() }}
        run: python scripts/fetch_yahoo.py "${{ github.event.inputs.keyword }}"
        env:
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          VALUECOMMERCE_SID: ${{ secrets.VALUECOMMERCE_SID }}
          VALUECOMMERCE_PID: ${{ secrets.VALUECOMMERCE_PID }}

      - name: Fetch Books Data
        if: ${{ always() }}
        run: python scripts/fetch_books.py "${{ github.event.inputs.keyword }}"
        env:
          GOOGLEBOOKS_API_KEY: ${{ secrets.GOOGLEBOOKS_API_KEY }}


      - name: Detect Signals (Layer 2)
        if: ${{ always() }}
        run: python scripts/signal_detector.py

      - name: Sync with remote
        if: ${{ always() }}
        run: git pull --rebase origin main

      - name: Auto Commit
        if: ${{ always() }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: automated product data update"
          file_pattern: "data/"
          branch: main
