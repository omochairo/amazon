name: Fetch Amazon Products
on:
  workflow_dispatch:
    inputs:
      asins:
        description: 'カンマ区切りASIN'
        required: false
      keyword:
        description: '検索キーワード'
        required: false
  schedule:
    - cron: '*/10 * * * *'  # 10分おきにトレンド取得

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Fetch Amazon Data
        run: |
          python scripts/fetch_amazon.py \
            --asin "${{ github.event.inputs.asins }}" \
            --keyword "${{ github.event.inputs.keyword }}" \
            --out data/raw/
        env:
          AMAZON_CREATORS_APPLICATION_ID: ${{ secrets.AMAZON_CREATORS_APPLICATION_ID }}
          AMAZON_CREATORS_CREDENTIAL_ID: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_ID }}
          AMAZON_CREATORS_CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_SECRET }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
      - name: Fetch Trends
        if: always()
        run: python scripts/fetch_trends.py --out data/raw/
      - name: Fetch Rakuten Data
        if: always()
        run: python scripts/fetch_rakuten.py --out data/raw/
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      - name: Fetch YouTube Data
        if: always()
        run: python scripts/fetch_youtube.py --out data/raw/
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - name: Fetch Yahoo News
        if: always()
        run: python scripts/fetch_yahoo_news.py --out data/raw/
      - uses: stefanzweifel/git-auto-commit-action@v5
        if: always()
        with:
          commit_message: "data: 商品データの自動更新"
          file_pattern: "data/raw/*.json"
          branch: main

          - name: Verify secrets format
  run: |
    echo "APPLICATION_ID length: ${#APPLICATION_ID}"
    echo "CREDENTIAL_ID length: ${#CREDENTIAL_ID}"
    echo "CREDENTIAL_SECRET length: ${#CREDENTIAL_SECRET}"
    echo "APPLICATION_ID first 4 chars: ${APPLICATION_ID:0:4}"
  env:
    APPLICATION_ID: ${{ secrets.AMAZON_CREATORS_APPLICATION_ID }}
    CREDENTIAL_ID: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_ID }}
    CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREATORS_CREDENTIAL_SECRET }}
