name: Fetch Amazon Products
on:
  workflow_dispatch:
    inputs:
      asins:
        description: 'カンマ区切りASIN'
        required: false
      keyword:
        description: '検索キーワード'
        required: false
  schedule:
    - cron: '0 22 * * *'  # 毎朝7時(JST)にトレンド取得

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Fetch Amazon Data
        run: |
          python scripts/fetch_amazon.py \
            --asin "${{ github.event.inputs.asins }}" \
            --keyword "${{ github.event.inputs.keyword }}" \
            --out data/products/
        env:
          PAAPI_ACCESS_KEY: ${{ secrets.PAAPI_ACCESS_KEY }}
          PAAPI_SECRET_KEY: ${{ secrets.PAAPI_SECRET_KEY }}
          PAAPI_PARTNER_TAG: ${{ secrets.PAAPI_PARTNER_TAG }}
      - name: Fetch Trends
        run: python scripts/fetch_trends.py
      - name: Validate Data
        run: |
          for f in data/products/*.json; do
            python scripts/validate_json.py --json "$f" --schema data/schema/product.schema.json
          done
      - name: Create queue if products updated
        run: python scripts/trend_picker.py
      - uses: peter-evans/create-pull-request@v6
        with:
          branch: data/auto-fetch
          title: "data: 商品データ更新"
